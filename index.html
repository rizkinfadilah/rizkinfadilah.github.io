<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizki Nur Fadilah — Virtual Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&family=Lora:ital,wght=0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f2044;
      --blue: #1a4fd6;
      --blue-mid: #2d6be4;
      --blue-light: #e8f0fd;
      --blue-pale: #f4f7fe;
      --accent: #4f8ef7;
      --white: #ffffff;
      --text: #1a2340;
      --text-muted: #5a6a8a;
      --border: #dce6f7;
    }
    html { scroll-behavior: smooth; }
    body { font-family: "Plus Jakarta Sans", sans-serif; color: var(--text); background: var(--white); line-height: 1.6; }
    
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 64px; background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-weight: 800; font-size: 1rem; color: var(--navy); letter-spacing: -0.02em; }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta { background: var(--blue); color: white !important; padding: 0.5rem 1.25rem; border-radius: 100px; font-weight: 600 !important; }
    .nav-cta:hover { background: var(--navy) !important; }
    
    .hero {
      min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
      align-items: center; padding: 80px 8% 0; background: var(--blue-pale);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ""; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%); pointer-events: none;
    }
    .hero-text { padding-right: 2rem; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem; background: var(--blue-light);
      color: var(--blue); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 100px; margin-bottom: 1.5rem;
    }
    .hero-eyebrow::before { content: ""; width: 6px; height: 6px; background: var(--blue); border-radius: 50%; }
    .hero h1 { font-size: clamp(2.2rem, 4vw, 3.2rem); font-weight: 800; line-height: 1.15; letter-spacing: -0.03em; color: var(--navy); margin-bottom: 0.75rem; }
    .hero h1 em { font-family: "Lora", serif; font-style: italic; color: var(--blue); font-weight: 400; }
    .hero-tagline { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 420px; line-height: 1.7; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem; background: var(--blue); color: white;
      padding: 0.85rem 1.75rem; border-radius: 100px; font-weight: 700; font-size: 0.9rem;
      text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 20px rgba(26,79,214,0.3);
    }
    .btn-primary:hover { background: var(--navy); transform: translateY(-2px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; color: var(--navy);
      padding: 0.85rem 1.75rem; border-radius: 100px; font-weight: 600; font-size: 0.9rem;
      text-decoration: none; border: 2px solid var(--border); transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }
    
    .hero-image { display: flex; justify-content: center; align-items: center; }
    .hero-image img {
      width: 280px; height: 280px; object-fit: cover; border-radius: 50%;
      filter: drop-shadow(0 12px 32px rgba(15,32,68,0.15)); max-width: 100%;
    }
    
    .stats-bar { background: var(--navy); padding: 1.5rem 8%; display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; }
    .stat { text-align: center; color: white; }
    .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
    .stat-label { font-size: 0.78rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.15rem; }
    
    section { padding: 5rem 8%; }
    .section-eyebrow { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.75rem; }
    .section-title { font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800; color: var(--navy); letter-spacing: -0.02em; margin-bottom: 1rem; line-height: 1.2; }
    .section-subtitle { font-size: 1rem; color: var(--text-muted); max-width: 520px; line-height: 1.7; }
    
    #about { background: var(--white); display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .about-text p { color: var(--text-muted); line-height: 1.8; margin-bottom: 1rem; font-size: 0.95rem; }
    .about-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
    .tag { background: var(--blue-light); color: var(--blue); font-size: 0.78rem; font-weight: 600; padding: 0.35rem 0.85rem; border-radius: 100px; }
    .about-card { background: var(--blue-pale); border-radius: 20px; padding: 2rem; border: 1px solid var(--border); }
    .about-card-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 1.25rem; }
    .edu-item, .exp-item { padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .edu-item:last-child, .exp-item:last-child { border-bottom: none; }
    .edu-year, .exp-period { font-size: 0.75rem; font-weight: 600; color: var(--blue); margin-bottom: 0.25rem; }
    .edu-school, .exp-role { font-size: 0.88rem; font-weight: 600; color: var(--navy); }
    .edu-degree, .exp-company { font-size: 0.8rem; color: var(--text-muted); }
    
    #tools { background: var(--white); padding: 5rem 8%; border-top: 1px solid var(--border); }
    .tools-header { text-align: center; margin-bottom: 2.5rem; }
    .tools-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.25rem; }
    .tool-item { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; background: var(--blue-pale); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.4rem; min-width: 90px; transition: all 0.2s; }
    .tool-item:hover { border-color: var(--blue); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,79,214,0.1); }
    .tool-item img { width: 32px; height: 32px; object-fit: contain; }
    .tool-name { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-align: center; white-space: nowrap; }
    
    #services { background: var(--blue-pale); }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .service-card { background: white; border-radius: 16px; padding: 2rem; border: 1px solid var(--border); transition: all 0.25s; position: relative; overflow: hidden; }
    .service-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--blue); transform: scaleX(0); transition: transform 0.25s; transform-origin: left; }
    .service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,79,214,0.1); }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon { font-size: 1.75rem; margin-bottom: 1rem; }
    .service-title { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
    .service-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }
    .service-list { list-style: none; margin-top: 1rem; }
